name: Helm Chart CI

on:
  push:
    branches: [main]

jobs:
  helm-lint-and-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Lint Helm chart
        run: helm lint charts/webapp

      - name: Template render check
        run: helm template my-webapp charts/webapp

      - name: Package Helm chart
        run: helm package charts/webapp --destination ./dist

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: ./dist/*.tgz